<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Топ видео Roblox</title>
<style>
    *, *::before, *::after {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 10px;
        background: #f9f9f9;
        color: #333;
    }

    h1 {
        font-size: 48px; /* в два раза больше */
        margin-bottom: 20px;
    }

    button {
        width: 100%;
        padding: 40px; /* увеличено */
        font-size: 40px; /* в два раза больше */
        cursor: pointer;
        border-radius: 12px;
        border: none;
        background-color: #ff4500;
        color: white;
        margin-bottom: 25px;
    }

    button:hover {
        background-color: #e03e00;
    }

    ul { 
        list-style: none; 
        padding: 0; 
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
    }

    li {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    li .title-row {
        display: flex;
        align-items: center;
        font-size: 22px;
        margin-bottom: 12px;
        gap: 12px;
    }

    li .place {
        font-weight: bold;
        font-size: 26px;
        flex-shrink: 0;
    }

    li .title {
        font-weight: bold;
        color: #06f;
        text-decoration: none;
        flex: 1;
    }

    li .title:hover {
        text-decoration: underline;
    }

    li .content {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }

    li img {
        width: 360px; /* ещё больше */
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        flex-shrink: 0;
    }

    li .metrics {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        font-size: 18px;
    }

    pre {
        background: #222;
        color: #0f0;
        padding: 12px;
        overflow-x: auto;
        margin-top: 30px;
        border-radius: 8px;
        font-size: 16px;
    }

    /* Адаптация под смартфоны */
    @media (max-width: 600px) {
        li .content {
            flex-direction: column;
        }
        li img {
            width: 100%; /* превью на всю ширину */
        }
        li .metrics {
            flex-direction: row;
            justify-content: space-between;
            margin-top: 8px;
        }
    }
</style>
</head>
<body>

<h1>🔥 Топ видео Roblox каналов (YouTube RU)</h1>

<button id="loadBtn">Загрузить тренды</button>

<ul id="topList"></ul>

<h2>📊 Дебаг</h2>
<pre id="debug"></pre>

<script>
document.getElementById('loadBtn').addEventListener('click', async () => {
    const debugEl = document.getElementById('debug');
    const topEl = document.getElementById('topList');

    debugEl.textContent = "Загрузка...";
    topEl.innerHTML = "";

    try {
        const res = await fetch('/api/trends');
        const data = await res.json();

        // Дебаг
        debugEl.textContent = (data.debug || []).join("\n");

        if (!data.top || data.top.length === 0) {
            topEl.innerHTML = "<li>❌ Ничего не найдено</li>";
            return;
        }

        data.top.forEach((v, index) => {
            const li = document.createElement('li');

            li.innerHTML = `
                <div class="title-row">
                    <div class="place">${index + 1}.</div>
                    <a class="title" href="${v.url}" target="_blank">${v.title}</a>
                </div>
                <div class="content">
                    <img src="${v.thumbnail}" alt="Превью">
                    <div class="metrics">
                        ⚡ ${Math.round(v.speed)} /час<br>
                        👁 ${v.views}<br>
                        ⏱ ${v.hours.toFixed(1)}ч
                    </div>
                </div>
            `;

            topEl.appendChild(li);
        });

    } catch (err) {
        debugEl.textContent = "Ошибка:\n" + err;
    }
});
</script>

</body>
</html>
