<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренды Roblox</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f9f9f9; 
        }
        pre { 
            background: #222; 
            color: #0f0; 
            padding: 10px; 
            overflow-x: auto; 
        }
        h2 { margin-top: 20px; }
        ul { line-height: 1.6; }
        a { color: #06f; text-decoration: none; }
    </style>
</head>
<body>

<h1>🔥 Тренды Roblox (YouTube RU)</h1>

<button id="loadBtn">Загрузить тренды</button>

<h2>📊 Дебаг</h2>
<pre id="debug"></pre>

<h2>🏆 Топ карт / тем</h2>
<ul id="topList"></ul>

<script>
document.getElementById('loadBtn').addEventListener('click', async () => {
    const debugEl = document.getElementById('debug');
    const topEl = document.getElementById('topList');

    debugEl.textContent = "Загрузка...";
    topEl.innerHTML = "";

    try {
        const res = await fetch('/api/trends');
        const data = await res.json();

        // Дебаг
        debugEl.textContent = (data.debug || []).join("\n");

        // Проверка
        if (!data.top || data.top.length === 0) {
            topEl.innerHTML = "<li>❌ Ничего не найдено</li>";
            return;
        }

        // Вывод топа
        data.top.forEach(v => {
    const li = document.createElement('li');

    li.innerHTML = `
        <a href="${v.url}" target="_blank">${v.title}</a><br>
        👁 ${v.views} | ⏱ ${v.hours.toFixed(1)}ч | ⚡ ${Math.round(v.speed)} /час
    `;

    topEl.appendChild(li);
});

    } catch (err) {
        debugEl.textContent = "Ошибка:\n" + err;
    }
});
</script>

</body>
</html>
