<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roblox Trends</title>
</head>
<body>

<h1>🔥 Топ карт Roblox (YouTube)</h1>
<button onclick="load()">Анализировать</button>

<div id="results"></div>

<script>
async function load() {
    const res = await fetch('/api/trends');
    const data = await res.json();

    const container = document.getElementById('results');
    container.innerHTML = "";

    data.forEach(([name, info]) => {
        const div = document.createElement('div');
        div.innerHTML = `<h2>${name} — 🔥 ${Math.round(info.score)}</h2>`;

        info.videos.slice(0, 3).forEach(v => {
            const p = document.createElement('p');
            p.innerHTML = `
                <a href="${v.url}" target="_blank">${v.title}</a><br>
                👁 ${v.views} | ⏱ ${v.hours.toFixed(1)}ч
            `;
            div.appendChild(p);
        });

        container.appendChild(div);
    });
}
</script>

</body>
</html>
